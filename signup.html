<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Ember Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <a href="index.html" class="brand"><span class="dot"></span>Ember Exchange</a>
  <span class="practice-badge"><span class="dot"></span>Practice Funds Only</span>
</nav>

<div class="auth-wrap">
  <h1>Create your account</h1>
  <p class="sub">You'll start with 10,000 practice USD to trade with.</p>

  <div id="msg"></div>

  <form id="signupForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" required minlength="3" placeholder="satoshi">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Create account</button>
  </form>

  <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
<script>
  const form = document.getElementById("signupForm");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.innerHTML = "";
    btn.disabled = true;
    btn.textContent = "Creating account...";

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signUp({
      email, password,
      options: { data: { username } }
    });

    if (error) {
      msg.innerHTML = `<div class="msg error">${error.message}</div>`;
      btn.disabled = false;
      btn.textContent = "Create account";
      return;
    }

    // Username stored in profiles by the DB trigger from email prefix by default;
    // update it here to match what the user actually typed.
    if (data.user) {
      await supabaseClient.from("profiles").update({ username }).eq("id", data.user.id);
    }

    msg.innerHTML = `<div class="msg success">Account created. Redirecting to your dashboard...</div>`;
    setTimeout(() => window.location.href = "dashboard.html", 1200);
  });
</script>

</body>
</html>
